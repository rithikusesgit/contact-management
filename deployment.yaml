apiVersion: apps/v1
kind: Deployment
metadata:
  name: contact-management
spec:
  replicas: 2
  selector:
    matchLabels:
      app: contact-management
  template:
    metadata:
      labels:
        app: contact-management
    spec:
      containers:
      - name: contact-management
        image: 23mis0353/contact-management:latest
        imagePullPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: contact-management-service
spec:
  type: NodePort
  selector:
    app: contact-management
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30008
